<script>
const DATA = [{"section": "संयुक्त-व्यञ्जनानि – परिचयः", "questions": [{"q": "संयुक्त-व्यञ्जनानि कथं भवन्ति?", "a": "द्वयोः बहूनां वा व्यञ्जन-वर्णानां मेलनेन संयुक्त-व्यञ्जनानि भवन्ति। एतानि नवीनाः वर्णाः न सन्ति, अपितु पृथक्-पृथक् संयुक्त-व्यञ्जन-वर्णानां विशिष्टा लेखन-शैली एव। एतैः सह आगतः स्वरः संयुक्त-व्यञ्जनेषु अन्तर्भूतः नास्ति।", "qEn": "How are conjunct consonants formed?", "aEn": "Conjunct consonants are formed by joining two or more consonant letters together. They are not new letters — just a special way of writing separate consonants combined. The vowel that follows is not merged inside the conjunct itself."}, {"q": "क्ष इति संयुक्त-व्यञ्जनं कथं बनति? उदाहरणेन स्पष्टीकुर्वन्तु (कक्षा)।", "a": "क्ष = क् + ष् + अ\nकक्षा = क् + अ + क् + ष् + आ", "qEn": "How is the conjunct 'क्ष' formed? Explain with the example कक्षा.", "aEn": "क्ष = क् + ष् + अ\nकक्षा (class/classroom) = क् + अ + क् + ष् + आ"}, {"q": "त्र इति संयुक्त-व्यञ्जनं कथं बनति? उदाहरणेन स्पष्टीकुर्वन्तु (पत्रम्)।", "a": "त्र = त् + र् + अ\nपत्रम् = प् + अ + त् + र् + अ + म्", "qEn": "How is the conjunct 'त्र' formed? Explain with the example पत्रम्.", "aEn": "त्र = त् + र् + अ\nपत्रम् (letter/leaf) = प् + अ + त् + र् + अ + म्"}, {"q": "ज्ञ इति संयुक्त-व्यञ्जनं कथं बनति? उदाहरणेन स्पष्टीकुर्वन्तु (ज्ञानम्)।", "a": "ज्ञ = ज् + ञ् + अ\nज्ञानम् = ज् + ञ् + आ + न् + अ + म्", "qEn": "How is the conjunct 'ज्ञ' formed? Explain with the example ज्ञानम्.", "aEn": "ज्ञ = ज् + ञ् + अ\nज्ञानम् (knowledge) = ज् + ञ् + आ + न् + अ + म्"}, {"q": "द्य इति संयुक्त-व्यञ्जनं कथं बनति? उदाहरणेन स्पष्टीकुर्वन्तु (विद्या)।", "a": "द्य = द् + य् + अ\nविद्या = व् + इ + द् + य् + आ", "qEn": "How is the conjunct 'द्य' formed? Explain with the example विद्या.", "aEn": "द्य = द् + य् + अ\nविद्या (knowledge/learning) = व् + इ + द् + य् + आ"}, {"q": "किमर्थं संयुक्त-व्यञ्जनानि 'नवीनाः वर्णाः' न कथ्यन्ते?", "a": "कारणं यत् एतानि केवलं पूर्व-विद्यमानानां पृथक्-पृथक् व्यञ्जन-वर्णानां विशिष्टा लेखन-शैली (writing style) एव सन्ति — नवी // sectionIdx-qIdx → images to show
// Sections: 0=Ex1.1, 1=Ex1.2, 2=Ex1.3, 3=Ex1.4, 4=Ex1.5, 5=Ex1.6
const IMAGE_MAP = {};

function setImgs(containerId, files) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  if (!files || !files.length) return;
  files.forEach(f => {
    const img = document.createElement('img');
    img.src = 'images/sanskrit2/' + f;
    img.alt = '';
    el.appendChild(img);
  });
}

let sectionIdx = 0;
let qIdx = 0;

function init() {
  const bar = document.getElementById('section-bar');
  DATA.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'sec-btn' + (i === 0 ? ' active' : '');
    btn.textContent = s.section;
    btn.onclick = () => goSection(i);
    bar.appendChild(btn);
  });
  render();
}

function goSection(i) {
  sectionIdx = i;
  qIdx = 0;
  document.querySelectorAll('.sec-btn').forEach((b, idx) => {
    b.classList.toggle('active', idx === i);
  });
  render();
}

function render() {
  const section = DATA[sectionIdx];
  const total = section.questions.length;
  const done = qIdx >= total;

  document.getElementById('main-card').style.display = done ? 'none' : 'block';
  document.getElementById('done-card').classList.toggle('visible', done);
  document.getElementById('nav-row') && null;

  if (!done) {
    const q = section.questions[qIdx];
    document.getElementById('q-label').textContent = `Question ${qIdx + 1} of ${total}`;
    document.getElementById('q-count').textContent = section.section;
    document.getElementById('q-text').textContent = q.q;
    document.getElementById('q-text-en').textContent = q.qEn || '';
    document.getElementById('a-text').textContent = q.a;
    document.getElementById('a-text-en').textContent = q.aEn || '';
    document.getElementById('answer-box').classList.remove('visible');
    document.getElementById('show-btn').style.display = 'block';

    const imgs = IMAGE_MAP[`${sectionIdx}-${qIdx}`] || {};
    setImgs('q-imgs', imgs.qimg ? [imgs.qimg] : []);
    setImgs('a-imgs', []);

    const fill = ((qIdx) / total) * 100;
    document.getElementById('progress-fill').style.width = fill + '%';
  }

  document.getElementById('prev-btn').disabled = (qIdx === 0);
  document.getElementById('next-btn').disabled = done;
}

function showAnswer() {
  document.getElementById('answer-box').classList.add('visible');
  document.getElementById('show-btn').style.display = 'none';
  const imgs = IMAGE_MAP[`${sectionIdx}-${qIdx}`] || {};
  setImgs('a-imgs', imgs.aimg || []);
}

function nextQ() {
  const total = DATA[sectionIdx].questions.length;
  if (qIdx < total) {
    qIdx++;
    render();
    if (qIdx === total) {
      document.getElementById('progress-fill').style.width = '100%';
    }
  }
}

function prevQ() {
  if (qIdx > 0) { qIdx--; render(); }
}

function restart() {
  qIdx = 0;
  render();
}

init();
</script>
</body>
</html>
